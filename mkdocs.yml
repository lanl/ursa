site_name: URSA
repo_url: https://github.com/lanl/ursa

theme:
  name: material
  logo: assets/favicon.png
  favicon: assets/favicon.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          inventories:
            - url: https://docs.python.org/3/objects.inv
              domains: [py, std]
          options:
            show_source: true  # link back to your code
            show_submodules: true

watch:
  - src

nav:
  - Home: index.md
  - Installation:
      - Overview: installation/index.md
      - Install with uv: installation/uv.md
      - Install with pip: installation/pip.md
  - Getting Started:
      - CLI: getting-started/cli.md
      - Web Dashboard: getting-started/dashboard.md
      - Python Scripts: getting-started/python-scripts.md
      - Plan-Execute From YAML: getting-started/plan-execute-yaml.md
      - MCP Server: getting-started/mcp-server.md
  - Configuration:
      - Overview: configuration/index.md
      - OpenAI-compatible endpoints: configuration/openai-compatible.md
      - Ollama and local endpoints: configuration/ollama.md
      - LangChain providers: configuration/langchain-providers.md
      - Files, CLI flags, and environment variables: configuration/files-and-env.md
      - MCP server configuration: configuration/mcp.md
  - Persistence:
      - Overview: persistence/index.md
      - Named agents: persistence/named-agents.md
      - Groups and endpoint security: persistence/groups-and-security.md
      - RAG collections: persistence/rag.md
      - Checkpoints and sharing: persistence/checkpoints-and-sharing.md
      - Quick reference: persistence/quick-reference.md
  - Agents:
      - Overview: agents/index.md
      - Chat Agent: agents/chat.md
      - Acquisition Agents:
          - Overview: agents/acquisition/index.md
          - arXiv Agent: agents/acquisition/arxiv.md
          - OSTI Agent: agents/acquisition/osti.md
          - Web Search Agent: agents/acquisition/web-search.md
      - Deep Review Agent: agents/deep-review.md
      - DSI Agent: agents/dsi.md
      - Execution Agent: agents/execution.md
      - Git Go Agent: agents/git-go.md
      - Hypothesizer Agent: agents/hypothesizer.md
      - LAMMPS Agent: agents/lammps.md
      - Planning Agent: agents/planning.md
  - Environments:
      - Overview: environments/index.md
      - Agent Teams: environments/agent-teams.md
      - Agent Symposia: environments/agent-symposia.md
      - Visualizing Environment Runs: environments/visualization.md
  - Best Practices:
      - Sandboxing and information control: best-practices/sandboxing.md
      - Contributing: best-practices/contributing.md
  - Reference:
      - CLI reference: reference/cli.md
      - MCP reference: reference/mcp.md
      - Event logging: reference/logging_events.md
      - Metrics: reference/metrics.md
      - Plan-Execute checkpointing: reference/plan-execute-checkpointing.md
      - Tutorials and examples:
          - Combining arXiv agent and execution agent: reference/tutorials/arxiv-execution.md
          - Human in the Loop: reference/tutorials/human-in-the-loop.md
          - Neutron Star: reference/tutorials/neutron-star.md
      - API Reference:
          - agents: reference/api/agents.md
          - environments: reference/api/environments.md
          - prompt_library: reference/api/prompt-library.md
          - tools: reference/api/tools.md
          - util: reference/api/util.md
